<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Foxysprolt">
    <link rel="stylesheet" href="styles.css">
    <title>O Chamado</title>
</head>
<body>

<main class="chat-container">

    <header class="chat-header">
        <h1>O <span>Chamado</span></h1>
        <p>Manda o problema do carregador que eu resolvo!</p>
    </header>

    <section class="chat-box" id="chat"></section>

    <div class="input-area">
        <textarea class="caixa-texto" placeholder="Escreve o problema do carregado..." rows="2"></textarea>
        <button class="botao-ajuda">Enviar</button>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
