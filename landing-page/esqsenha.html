<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Foxysprolty">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="/img/log.png">
    <title>Recuperar senha</title>
</head>
<body class="esqsenha">
    <main class="container">
        <form>
            <h1>Esqueceu sua senha?</h1>
            <div class="input-box">
                <input type="email" name="email-usuario" id="gmail" placeholder="Email">
                <i class="bx bx-envelope"></i>
            </div>
            <button type="submit" class="login" onclick="alert('PAGINA EM DESENVOLVIMENTO')">Enviar código</button>
            <div class="reg">
                <p><a href="index.html">Voltar para login</a></p>
            </div>
        </form>

    </main>
</body>
<audio id="bg-music" loop>
    <source src="music/fundo.mp3" type="audio/mpeg">
</audio>

<!-- Botão play/pause -->
<button id="music-btn" onclick="
    const audio=document.getElementById('bg-music');
    const btn=this;
    if(audio.paused){
        audio.play();
        audio.volume = 0.01;
        btn.textContent='⏸ Pause Music';
    } else {
        audio.pause();
        btn.textContent='▶ Play Music';
    }
">▶ Play music</button>
</html>
